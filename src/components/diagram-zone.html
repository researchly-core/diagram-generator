<!-- Component: diagram-zone -->
<section class="zone">
  <div class="badge">{{number}}</div>
  <h2 class="zone-title">{{title}}</h2>
  {{content}}
</section>

<!-- Wide variant for a zone with a narrow side panel and main content. -->
<section class="zone zone-wide">
  <div class="badge">{{number}}</div>
  <h2 class="zone-title">{{title}}</h2>
  {{sidePanel}}
  {{mainContent}}
</section>
