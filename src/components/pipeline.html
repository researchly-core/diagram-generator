<!-- Component: pipeline -->
<div class="pipeline">
  <div class="step">
    <div class="step-icon">{{icon1}}</div>
    <span>{{label1}}</span>
  </div>
  <div class="step">
    <div class="step-icon">{{icon2}}</div>
    <span>{{label2}}</span>
  </div>
  <div class="step">
    <div class="step-icon">{{icon3}}</div>
    <span>{{label3}}</span>
  </div>
</div>

<!-- Optional matching timeline labels. Keep item count aligned with pipeline steps. -->
<div class="dotline">
  <span>{{milestone1}}</span>
  <span>{{milestone2}}</span>
  <span>{{milestone3}}</span>
</div>
