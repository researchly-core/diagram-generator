<!-- Component: stage -->
<section class="stage">
  <h3 class="stage-title">{{title}}</h3>
  <div class="mini-flow">
    <div class="mini">
      <div class="mini-icon">{{icon1}}</div>
      <span>{{label1}}</span>
    </div>
    <div class="mini">
      <div class="mini-icon">{{icon2}}</div>
      <span>{{label2}}</span>
    </div>
    <div class="mini">
      <div class="mini-icon">{{icon3}}</div>
      <span>{{label3}}</span>
    </div>
  </div>
  {{content}}
</section>

<!-- Dashed variant for optional or out-of-scope stages. -->
<section class="stage dashed">
  <h3 class="stage-title">{{title}}</h3>
  {{content}}
</section>
